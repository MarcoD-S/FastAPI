<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111827">
    <title>IndieVerse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>IndieVerse</h1>
</header>

<main>

    <section class="hero" id="hero">

    <div class="overlay">

        <h1 id="heroTitulo">
            IndieVerse
        </h1>

        <p id="heroDescricao">
            Descubra os melhores jogos independentes já criados.
        </p>

    </div>

</section>

    <section class="catalogo">

        <h2>Jogos em Destaque</h2>

        <div class="controles">

            <input
                type="text"
                id="pesquisa"
                placeholder="Pesquisar jogo..."
            >

            <button id="trocarLayout">
                📋 Lista
            </button>

        </div>

        <div id="jogos" class="jogos"></div>

    </section>

</main>

<footer>
    <p>Um projeto produzido por: Marco Duarte</p>
</footer>

<script src="script.js"></script>

</body>
</html>
